<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorix</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&family=Pixelify+Sans:wght@400..700&display=swap"
        rel="stylesheet">
</head>

<body>
    <h1>Memorix</h1>
    <h2>Press any key to start</h2>
    
    <div class="btn-container">
        <div class="line1 btns">
            <div class="btn one" type="button" id="one"></div>
            <div class="btn two" type="button" id="two"></div>
            <div class="btn three" type="button" id="three"></div>
        </div>
        <div class="line2 btns">
            <div class="btn four" type="button" id="four"></div>
            <div class="btn five" type="button" id="five"></div>
            <div class="btn six" type="button" id="six"></div>
        </div>
        <div class="line3 btns">
            <div class="btn seven" type="button" id="seven"></div>
            <div class="btn eight" type="button" id="eight"></div>
            <div class="btn nine" type="button" id="nine"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
